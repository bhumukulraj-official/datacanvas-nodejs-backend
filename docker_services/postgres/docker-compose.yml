version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: datacanvas_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-datacanvas}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./conf:/etc/postgresql/conf.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datacanvas_network

networks:
  datacanvas_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local 