# Memory Configuration
shared_buffers = '256MB'                  # 25% of total RAM for dedicated servers
work_mem = '16MB'                         # Depends on max_connections
maintenance_work_mem = '64MB'             # For maintenance operations

# Checkpoint Configuration
checkpoint_timeout = '15min'              # Checkpoint timeout
checkpoint_completion_target = 0.9        # Spread checkpoint writes over this much time
max_wal_size = '1GB'                     # Maximum WAL size before checkpoint
min_wal_size = '80MB'                    # Minimum WAL size

# Query Planner Configuration
effective_cache_size = '768MB'            # Should be around 50-75% of available RAM
random_page_cost = 1.1                    # Assuming SSD storage
effective_io_concurrency = 200            # Concurrent IO operations

# Connection Settings
max_connections = 100                     # Maximum number of connections
listen_addresses = '*'                    # Listen on all available addresses

# Logging Configuration
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = '1d'
log_rotation_size = '10MB'
log_min_duration_statement = 1000         # Log statements taking more than 1 second
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Autovacuum Configuration
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05 