version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: datacanvas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - datacanvas-network

networks:
  datacanvas-network:
    driver: bridge

volumes:
  redis_data:
    driver: local 